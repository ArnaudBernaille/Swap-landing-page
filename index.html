/* ── SPARKLINE ── */
function Sparkline({ data, color, h = 64 }) {
  if (!data || data.length < 2) return null;
  const W = 300;
  const mn = Math.min(...data), mx = Math.max(...data), rng = mx - mn || 0.0001;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * W,
    h - 4 - ((v - mn) / rng) * (h - 12)
  ]);
  const d = pts.map((p, i) => (i ? `L${p[0]},${p[1]}` : `M${p[0]},${p[1]}`)).join(' ');
  const area = d + ` L${W},${h} L0,${h} Z`;
  const gid = `sg${color.replace(/\W/g,'')}`;
  return (
    <svg viewBox={`0 0 ${W} ${h}`} style={{ width:'100%', height:h, display:'block' }} preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gid})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color}/>
    </svg>
  );
}

/* ── ARCHITECTURE DIAGRAM ── */
function ArchDiagram() {
  const [spx, setSpx] = useState(5234.12);
  const [sofr, setSofr] = useState(5.31);
  const [bankAPY, setBankAPY] = useState(4.12);
  const [clientAPY, setClientAPY] = useState(3.89);
  const [spxHist, setSpxHist] = useState(() => Array.from({length:28}, (_,i) => 5180 + Math.sin(i*0.4)*28 + Math.random()*12));
  const [settling, setSettling] = useState(false);
  const [step, setStep] = useState(0);
  const [tick, setTick] = useState(0);

  useEffect(() => {
    const iv = setInterval(() => {
      const d = (Math.random()-.5)*3.2;
      setSpx(p => { const n = +(Math.max(4900, p+d).toFixed(2)); setSpxHist(h => [...h.slice(-27), n]); return n; });
      setSofr(r => +(Math.max(4.8, Math.min(5.8, r+(Math.random()-.5)*.005)).toFixed(3)));
      setBankAPY(y => +(Math.max(3.5, Math.min(5.5, y+(Math.random()-.5)*.025)).toFixed(2)));
      setClientAPY(y => +(Math.max(3.2, Math.min(5.2, y+(Math.random()-.5)*.025)).toFixed(2)));
      setTick(t => t+1);
    }, 1100);
    return () => clearInterval(iv);
  }, []);

  const yieldHist = useMemo(() => Array.from({length:20}, (_,i) => ({
    b: bankAPY + Math.sin(i*.6)*.1 + (Math.random()-.5)*.05,
    c: clientAPY + Math.cos(i*.6)*.1 + (Math.random()-.5)*.05,
  })), [tick]);

  const triggerSettlement = () => {

    setResult(Math.abs(b-c) < 0.0001 ? 'accepted' : 'rejected');

          </div>
        </div>

        {result && (
          <div style={{ maxWidth:760, marginTop:16, padding:'12px 18px', borderRadius:3, background:`${rc[result]}10`, border:`1px solid ${rc[result]}35`, fontFamily:'IBM Plex Mono', fontSize:12, color:rc[result] }}>

        <div style={{ maxWidth:760, marginTop:12, fontFamily:'IBM Plex Mono', fontSize:11, color:'var(--muted)' }}>
          Interactive demo: enter the same value in both fields → consensus accepted.

      </div>
    </section>
  );
}

function PillSelect({ options, value, onChange, color }) {
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginTop:8 }}>
      {options.map(o => {
        const active = value === o.v;
        return (
          <button key={o.v} onClick={() => onChange(o.v)} style={{
            fontFamily:'IBM Plex Mono', fontSize:10, padding:'5px 12px', borderRadius:2, cursor:'pointer',
            border: `1px solid ${active ? color : 'rgba(255,255,255,0.1)'}`,
            background: active ? `${color}22` : 'transparent',
            color: active ? color : 'var(--muted)',
            transition:'all .15s', letterSpacing:'.04em'
          }}>{o.l}</button>
        );
      })}
    </div>
  );
}

function ToggleSwitch({ value, onChange, color }) {
  return (
    <div onClick={() => onChange(!value)} style={{
      width:36, height:20, borderRadius:10, cursor:'pointer',
      background: value ? color : 'rgba(255,255,255,0.08)',
      position:'relative', transition:'background .2s', flexShrink:0
    }}>
      <div style={{
        position:'absolute', top:3, left: value ? 19 : 3,
        width:14, height:14, borderRadius:'50%', background:'#fff',
        transition:'left .18s', boxShadow:'0 1px 3px rgba(0,0,0,0.4)'
      }}/>
    </div>
  );
}

function ConfigRow({ label, hint, children }) {

    <div style={{ marginBottom:24 }}>

    </div>
  );
}

      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
